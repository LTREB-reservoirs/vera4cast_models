  workflow_dispatch:


name: spcond_RF_abp ## POPULATE THIS WITH YOUR MODEL ID

jobs:
  docker:
    runs-on: ubuntu-latest
    container: rqthomas/vera-rocker:latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v3

      - name: Install
        shell: Rscript {0}
        run: |
          install.packages(c("zoo", "randomForest")) ## POPULATE THIS WITH ANY SPECIFIC PACKAGES YOU NEED

      - name: Generate forecasts
        shell: Rscript {0}
        run: |
          source("model_code/spcond_rf_abp/model_workflow.R") ## POPULATE THIS WITH THE PATH TO YOUR CODE
