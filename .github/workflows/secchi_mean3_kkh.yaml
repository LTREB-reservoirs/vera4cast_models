on:
  #schedule:
   # - cron: '0 15 * * *' ## UNCOMMENT THIS WHEN READY FOR AUTOMATION
  workflow_dispatch:


name: secchi_mean3_kkh
jobs:
  docker:
    runs-on: ubuntu-latest
    container: rqthomas/vera-rocker:latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v3

      - name: Install
        shell: Rscript {0}
        run: |
          install.packages(c("dplyr", "lubridate", "readr", "tidyr")) ## POPULATE THIS WITH ANY SPECIFIC PACKAGES YOU NEED

      - name: Generate forecasts
        shell: Rscript {0}
        run: |
          source("model_code/secchi_kkh/secchi_mean3_kkh.R") ## POPULATE THIS WITH THE PATH TO YOUR CODE
